    - generic [ref=e27]:
      - generic [ref=e30]: "1"
      - generic [ref=e31]:
        - heading "表面回暖：零售額回升" [level=2] [ref=e32]
        - paragraph [ref=e33]: 香港零售市場最新統計數據顯示，截止至今年2月，本地零售銷售額已明顯回升，按年升19.3%。然而，與銷售額同步上升的是四大核心商業區（旺角，尖沙咀，中環，銅鑼灣）的商舖空置率。
      - figure "圖表1：零售業銷貨價值指數按年變動百分率 VS 香港每月入境旅客人次（雙軸散點）" [ref=e34]:
        - generic [ref=e36]: 零售業銷貨價值指數按年變動百分率 VS 香港每月入境旅客人次
        - generic [ref=e39]:
          - text: 數據來源：零售業銷貨價值按年變動百分率——
          - link "香港特別行政區政府統計處" [ref=e40] [cursor=pointer]:
            - /url: https://www.censtatd.gov.hk/tc/web_table.html?id=620-67001
          - text: ；訪港旅客人數按年變動百分率——
          - link "香港旅業網" [ref=e41] [cursor=pointer]:
            - /url: https://partnernet.hktb.com/tc/research_statistics/tourism_performance/index.html
          - text: 。
      - generic [ref=e42]:
        - paragraph [ref=e43]: 據香港特別行政區政府統計處及香港旅業網公布的數據顯示，今年首兩個月零售銷售按年上升近20%，同期訪港旅客人次升幅達到40%，近1000萬人次。訪港旅客增長與零售市場表現呈現同向走勢，兩者關聯性密切。
        - paragraph [ref=e44]: 旅客增長為市場提供穩定消費來源，對零售業形成正面支撐，反映出行業正處於由客流帶動的調整及恢復階段。
    - generic [ref=e45]:
      - generic [ref=e48]: "2"
      - generic [ref=e49]:
        - heading "實際乏力：空置率上升" [level=2] [ref=e50]
        - paragraph [ref=e51]: 與此同時，市場另一端卻出現明顯收縮跡象。四大核心商業區商舖空置率持續上升，部分地段空置情況尤為突出。根據美聯工商舖資料研究部最新資料顯示，整體核心區的商鋪空置率已從2024年的10.65%升至2025年的12.0%，其中中環和銅鑼灣的鋪位空置情況最為突出，分別攀升至15.0%及9.8% 。即便是在傳統旺區如尖沙咀和旺角，商鋪丟空的情況也十分普遍，反映出核心商業地帶的租務表現正持續受壓。
