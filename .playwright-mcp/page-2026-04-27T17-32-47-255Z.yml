    - generic [ref=e66]:
      - generic [ref=e69]: "3"
      - generic [ref=e70]:
        - heading "成本端擠壓：租金與人工" [level=2] [ref=e71]
        - paragraph [ref=e72]: 造成這一「銷售升、空置增」現象的關鍵，在於成本端的持續擠壓。租金，是最直接的壓力來源之一。隨著市場預期回暖，核心區舖租止跌回升。 同時，人力成本同樣上行。在勞動力供給趨緊的背景下，零售行業工資水平持續攀升，進一步侵蝕利潤空間。根據高力國際發表《2026 年第一季市場報告》顯示，核心一線街舖租金預測在2026年攀升 5%。
      - figure "圖表3和圖表4：租金指數變化與零售行業工資中位數" [ref=e73]:
        - generic [ref=e77]:
          - generic [ref=e78]:
            - text: 租金數據來源：
            - link "高力" [ref=e79] [cursor=pointer]:
              - /url: https://www.colliers.com/download-article?itemId=01e0faf2-b695-4f5c-bb4e-670fb818b756
          - generic [ref=e80]:
            - text: 工資數據來源：
            - link "香港特別行政區政府統計處" [ref=e81] [cursor=pointer]:
              - /url: https://www.censtatd.gov.hk/tc/web_table.html?id=220-23015#
      - generic [ref=e83]:
        - text: 在這種情況下，不少商戶選擇縮減規模甚至退出市場。一名受訪服裝零售商張先生表示，其原本在市區經營兩家門店，一家在中環，一家在旺角，但在租金及人工成本持續上漲的壓力下，最終被迫辭退該店跟他一同共事了幾年的夥計，隨後又關閉了位於中環的店舖。僅保留租金偏低的門店以維持收益。張先生無奈地表達到：「儘管生意看起來是變好了，但實際來看利潤反而更薄了。」
        - img "張偉男先生" [ref=e84]
        - text: （56歲的張偉男先生，表示自己年紀大了，雖然對中環的店有很深的感情，但無奈於經濟壓力及考慮自身身體因素，最後選擇關閉中環店，保留離家更近的旺角店。）
    - generic [ref=e85]:
      - generic [ref=e88]: "4"
      - generic [ref=e89]:
        - heading "利潤承壓，結業增加" [level=2] [ref=e90]
        - paragraph [ref=e91]: 數據亦反映出，儘管整體銷售額回升，但結業店鋪數量也在同步增加。參考HK01報道及Facebook群組「全港店鋪執笠結業消息關注組」公開資料，經本報記者自行統計，2026年首四月平均每月有9.75家零售店鋪結業，對比去年后四月平均每月6.3家結業店鋪，上升近一倍。在零售業回升的情況下，店鋪結業潮仍在繼續。
